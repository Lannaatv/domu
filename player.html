<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Player — VidSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1a1a24;
      --border: #2a2a3a;
      --accent: #e8c547;
      --accent2: #f07060;
      --text: #f0f0f8;
      --muted: #7070a0;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .back-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
    .back-btn svg { width: 14px; height: 14px; }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -0.5px;
      text-decoration: none;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 2rem;
      align-items: start;
    }

    /* ── Left: Player area ── */
    .player-section {}

    /* Glow behind player */
    .player-wrap {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 0 60px rgba(232,197,71,0.06);
      background: #000;
      animation: fadeIn 0.5s ease both;
    }
    .player-wrap::before {
      content: '';
      position: absolute;
      inset: -20px;
      background: radial-gradient(ellipse at center, rgba(232,197,71,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    #player {
      width: 100%;
      aspect-ratio: 16/9;
      display: block;
    }

    /* ── Video Info ── */
    .video-info {
      margin-top: 1.4rem;
      animation: slideUp 0.5s 0.1s ease both;
    }

    .video-channel {
      font-size: 0.75rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .video-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.5px;
    }

    .video-actions {
      display: flex;
      gap: 0.6rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 999px;
      padding: 0.45rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .action-btn svg { width: 13px; height: 13px; }

    .download-btn {
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 500;
    }
    .download-btn:hover {
      background: rgba(232,197,71,0.12);
    }
    .download-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }
    .download-btn.loading svg {
      animation: spin 1s linear infinite;
    }
    @keyframes spin { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.2rem 0;
    }

    /* ── Right sidebar: Related ── */
    .sidebar {
      animation: slideUp 0.5s 0.15s ease both;
    }

    .sidebar-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
    }

    .related-list { display: flex; flex-direction: column; gap: 0.8rem; }

    .related-card {
      display: flex;
      gap: 0.8rem;
      text-decoration: none;
      color: inherit;
      border-radius: 10px;
      padding: 0.5rem;
      border: 1px solid transparent;
      transition: all 0.2s;
      cursor: pointer;
    }
    .related-card:hover {
      background: var(--card);
      border-color: var(--border);
    }

    .rel-thumb {
      flex-shrink: 0;
      width: 110px;
      aspect-ratio: 16/9;
      border-radius: 7px;
      overflow: hidden;
      background: var(--surface);
      position: relative;
    }
    .rel-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .related-card:hover .rel-thumb img { transform: scale(1.05); }
    .rel-play {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .related-card:hover .rel-play { background: rgba(0,0,0,0.3); }
    .rel-play-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0.6);
      transition: opacity 0.2s, transform 0.2s;
    }
    .related-card:hover .rel-play-dot { opacity: 1; transform: scale(1); }
    .rel-play-dot svg { width: 11px; height: 11px; margin-left: 2px; }

    .rel-info { flex: 1; min-width: 0; }
    .rel-channel {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.25rem;
    }
    .rel-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Skeleton for related */
    .skeleton {
      background: linear-gradient(90deg, var(--card), var(--surface), var(--card));
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }

    /* ── Error state ── */
    .error-state {
      text-align: center;
      padding: 4rem 2rem;
      grid-column: 1 / -1;
    }
    .error-state h2 {
      font-family: 'Syne', sans-serif;
      color: var(--accent2);
      margin-bottom: 0.5rem;
    }
    .error-state p { color: var(--muted); }
    .error-state a {
      display: inline-block;
      margin-top: 1.2rem;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      padding: 0.5rem 1.2rem;
      border-radius: 999px;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .error-state a:hover { background: rgba(232,197,71,0.1); }

    /* ── Animations ── */
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes shimmer { from { background-position: 200% 0 } to { background-position: -200% 0 } }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      .page {
        grid-template-columns: 1fr;
        padding: 1rem 1rem 3rem;
      }
      .sidebar { order: 2; }
      .player-section { order: 1; }
    }
    @media (max-width: 480px) {
      header { padding: 0 1rem; gap: 0.8rem; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <polyline points="15,18 9,12 15,6"/>
    </svg>
    Kembali
  </a>
  <a href="index.html" class="logo">Vid<span>Search</span></a>
</header>

<div class="page" id="page">
  <!-- injected by JS -->
</div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
  // ⚠️ GANTI dengan API Key YouTube Data v3 kamu (untuk related videos)
  const API_KEY = "AIzaSyCalKgiv801ubBNf0hrO3WprQ5kAZIE9GM";

  const params = new URLSearchParams(window.location.search);
  const videoId = params.get('v');
  const videoTitle = decodeURIComponent(params.get('title') || 'Video YouTube');
  const videoChannel = decodeURIComponent(params.get('channel') || '');

  const page = document.getElementById('page');

  if (!videoId) {
    page.innerHTML = `
      <div class="error-state">
        <h2>Video Tidak Ditemukan</h2>
        <p>Tidak ada video yang dipilih.</p>
        <a href="index.html">← Kembali ke Pencarian</a>
      </div>`;
  } else {
    // Render layout
    page.innerHTML = `
      <div class="player-section">
        <div class="player-wrap">
          <div id="player"></div>
        </div>
        <div class="video-info">
          ${videoChannel ? `<div class="video-channel">${escHtml(videoChannel)}</div>` : ''}
          <div class="video-title">${escHtml(videoTitle)}</div>
          <div class="video-actions">
            <a class="action-btn" href="https://www.youtube.com/watch?v=${videoId}" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
                <polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              Buka di YouTube
            </a>
            <button class="action-btn" onclick="shareVideo()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
              </svg>
              Bagikan
            </button>
            <button class="action-btn download-btn" id="dlBtn" onclick="downloadMp3()">
              <svg id="dlIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M12 3v12m0 0l-4-4m4 4l4-4"/>
                <path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2"/>
              </svg>
              <span id="dlLabel">Download MP3</span>
            </button>
          </div>
          <div class="divider"></div>
          <div style="font-size:0.78rem;color:var(--muted);line-height:1.7">
            Video diputar melalui YouTube IFrame Player API secara resmi.<br/>
            Untuk menonton tanpa iklan, buka langsung di YouTube Premium.
          </div>
        </div>
      </div>
      <div class="sidebar">
        <div class="sidebar-title">Video Terkait</div>
        <div id="relatedList" class="related-list">
          ${skeletonRelated(6)}
        </div>
      </div>
    `;

    document.title = `${videoTitle} — VidSearch`;

    // Load related videos
    if (API_KEY && API_KEY !== "YOUR_API_KEY_HERE") {
      fetchRelated(videoTitle);
    }
  }

  // ── YouTube IFrame Player ──
  let player;
  function onYouTubeIframeAPIReady() {
    if (!videoId) return;
    player = new YT.Player('player', {
      videoId: videoId,
      playerVars: {
        autoplay: 1,
        rel: 0,
        modestbranding: 1,
        playsinline: 1,
      },
      events: {
        onReady: (e) => e.target.playVideo()
      }
    });
  }

  // Jika YouTube API sudah ter-cache (pindah halaman), panggil manual
  if (window.YT && window.YT.Player) {
    onYouTubeIframeAPIReady();
  }

  // ── Related Videos ──
  function fetchRelated(title) {
    const q = encodeURIComponent(title.split(' ').slice(0, 4).join(' '));
    fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&maxResults=8&type=video&key=${API_KEY}`)
      .then(r => r.json())
      .then(data => {
        if (data.error || !data.items) return;
        const filtered = data.items.filter(i => i.id.videoId !== videoId);
        renderRelated(filtered.slice(0, 6));
      })
      .catch(() => {});
  }

  function renderRelated(items) {
    const list = document.getElementById('relatedList');
    if (!list) return;
    if (!items || items.length === 0) {
      list.innerHTML = '<div style="font-size:0.8rem;color:var(--muted)">Tidak ada video terkait.</div>';
      return;
    }
    list.innerHTML = items.map(item => {
      const vid = item.id.videoId;
      const title = escHtml(item.snippet.title);
      const channel = escHtml(item.snippet.channelTitle);
      const thumb = item.snippet.thumbnails.medium?.url || '';
      return `
        <a class="related-card" href="player.html?v=${vid}&title=${encodeURIComponent(title)}&channel=${encodeURIComponent(channel)}">
          <div class="rel-thumb">
            <img src="${thumb}" alt="${title}" loading="lazy"/>
            <div class="rel-play">
              <div class="rel-play-dot">
                <svg viewBox="0 0 24 24" fill="#0a0a0f"><polygon points="5,3 19,12 5,21"/></svg>
              </div>
            </div>
          </div>
          <div class="rel-info">
            <div class="rel-channel">${channel}</div>
            <div class="rel-title">${title}</div>
          </div>
        </a>`;
    }).join('');
  }

  function skeletonRelated(n) {
    return Array.from({length: n}, () => `
      <div style="display:flex;gap:0.8rem;padding:0.5rem">
        <div class="skeleton" style="width:110px;aspect-ratio:16/9;flex-shrink:0;border-radius:7px"></div>
        <div style="flex:1">
          <div class="skeleton" style="height:10px;width:50%;margin-bottom:8px"></div>
          <div class="skeleton" style="height:10px;width:90%;margin-bottom:6px"></div>
          <div class="skeleton" style="height:10px;width:70%"></div>
        </div>
      </div>`).join('');
  }

  function shareVideo() {
    const url = `https://www.youtube.com/watch?v=${videoId}`;
    if (navigator.share) {
      navigator.share({ title: videoTitle, url });
    } else {
      navigator.clipboard.writeText(url).then(() => {
        alert('Link disalin ke clipboard!');
      });
    }
  }

  async function downloadMp3() {
    const btn = document.getElementById('dlBtn');
    const label = document.getElementById('dlLabel');
    const icon = document.getElementById('dlIcon');

    // Set loading state
    btn.disabled = true;
    btn.classList.add('loading');
    icon.innerHTML = `<path d="M12 2a10 10 0 1 0 10 10" stroke-linecap="round"/>`;
    label.textContent = 'Memproses…';

    const youtubeUrl = `https://www.youtube.com/watch?v=${videoId}`;

    try {
      const res = await fetch('https://api.cobalt.tools/', {
        method: 'POST',
        headers: {
          'Accept': 'application/json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          url: youtubeUrl,
          downloadMode: 'audio',
          audioFormat: 'mp3',
          filenameStyle: 'pretty'
        })
      });

      const data = await res.json();

      if (data.status === 'tunnel' || data.status === 'redirect') {
        // Trigger download
        const a = document.createElement('a');
        a.href = data.url;
        a.download = (videoTitle || 'audio') + '.mp3';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        // Success state
        icon.innerHTML = `<polyline points="20,6 9,17 4,12"/>`;
        label.textContent = 'Berhasil!';
        setTimeout(resetDlBtn, 3000);

      } else if (data.status === 'picker') {
        // Some formats return picker — take first audio
        const audioItem = data.picker?.find(p => p.type === 'audio') || data.picker?.[0];
        if (audioItem?.url) {
          const a = document.createElement('a');
          a.href = audioItem.url;
          a.download = (videoTitle || 'audio') + '.mp3';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          icon.innerHTML = `<polyline points="20,6 9,17 4,12"/>`;
          label.textContent = 'Berhasil!';
          setTimeout(resetDlBtn, 3000);
        } else {
          throw new Error('Tidak ada audio ditemukan');
        }
      } else {
        throw new Error(data.error?.code || 'Gagal mendapatkan link');
      }

    } catch (err) {
      console.error('Download error:', err);
      // Error state — fallback ke cobalt.tools website
      icon.innerHTML = `<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>`;
      label.textContent = 'Coba via Web';
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.onclick = () => window.open(`https://cobalt.tools/#${encodeURIComponent(youtubeUrl)}`, '_blank');
      setTimeout(resetDlBtn, 5000);
    }
  }

  function resetDlBtn() {
    const btn = document.getElementById('dlBtn');
    const label = document.getElementById('dlLabel');
    const icon = document.getElementById('dlIcon');
    if (!btn) return;
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.onclick = downloadMp3;
    icon.innerHTML = `<path d="M12 3v12m0 0l-4-4m4 4l4-4"/><path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2"/>`;
    label.textContent = 'Download MP3';
  }

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
