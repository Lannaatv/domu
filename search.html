<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cari — VidSearch Music</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f; --sidebar: #0f0f16; --surface: #13131a;
      --card: #1a1a26; --card-hover: #20202e; --border: #252535;
      --accent: #e8c547; --accent2: #f07060; --accent3: #60b4f0;
      --text: #f0f0f8; --muted: #6a6a90; --muted2: #9090b8;
      --radius: 10px; --sidebar-w: 240px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }
    body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; opacity:.35; }
    .glow-blob { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; opacity:.04; z-index:0; }
    .glow1 { width:400px; height:400px; background:var(--accent); top:-100px; left:200px; }
    .glow2 { width:300px; height:300px; background:var(--accent3); bottom:100px; right:100px; }

    /* ─ Shell ─ */
    .app { display:flex; height:100vh; overflow:hidden; position:relative; z-index:1; }

    /* ─ Sidebar ─ */
    .sidebar { width:var(--sidebar-w); flex-shrink:0; background:var(--sidebar); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
    .sidebar-top { padding:1.5rem 1.4rem 1rem; }
    .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.35rem; letter-spacing:-.5px; text-decoration:none; color:var(--text); display:flex; align-items:center; gap:.5rem; margin-bottom:2rem; }
    .logo-icon { width:32px; height:32px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .logo-icon svg { width:16px; height:16px; }
    .logo span { color:var(--accent); }
    .nav-label { font-size:.65rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); padding:0 .6rem; margin-bottom:.3rem; }
    .nav-section { margin-bottom:.5rem; }
    .nav-item { display:flex; align-items:center; gap:.75rem; padding:.6rem .8rem; border-radius:8px; color:var(--muted2); text-decoration:none; font-size:.88rem; font-weight:500; cursor:pointer; transition:all .18s; border:none; background:none; width:100%; text-align:left; }
    .nav-item svg { width:18px; height:18px; flex-shrink:0; }
    .nav-item:hover { background:var(--card); color:var(--text); }
    .nav-item.active { background:rgba(232,197,71,.1); color:var(--accent); }
    .sidebar-genres { padding:1rem 1.4rem; border-top:1px solid var(--border); margin-top:auto; }
    .genre-grid { display:flex; flex-direction:column; gap:.2rem; }

    /* ─ Main ─ */
    .main { flex:1; overflow-y:auto; overflow-x:hidden; display:flex; flex-direction:column; min-width:0; }
    .main::-webkit-scrollbar { width:6px; }
    .main::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

    /* ─ Topbar ─ */
    .topbar { position:sticky; top:0; z-index:50; padding:1rem 2rem; background:rgba(10,10,15,.8); backdrop-filter:blur(20px); border-bottom:1px solid rgba(42,42,58,.5); display:flex; align-items:center; gap:1rem; }
    .back-btn { display:flex; align-items:center; gap:.4rem; color:var(--muted); border:1px solid var(--border); border-radius:999px; padding:.38rem .85rem; font-size:.8rem; text-decoration:none; transition:all .18s; flex-shrink:0; white-space:nowrap; }
    .back-btn:hover { color:var(--accent); border-color:var(--accent); }
    .back-btn svg { width:13px; height:13px; }
    .search-wrap { flex:1; max-width:480px; position:relative; }
    .search-wrap input { width:100%; background:var(--card); border:1px solid var(--border); border-radius:999px; padding:.62rem 3rem .62rem 1.1rem; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.88rem; outline:none; transition:border-color .2s,box-shadow .2s; }
    .search-wrap input::placeholder { color:var(--muted); }
    .search-wrap input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(232,197,71,.1); }
    .search-wrap .sbtn { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:var(--accent); border:none; border-radius:50%; width:30px; height:30px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:opacity .15s; }
    .search-wrap .sbtn:hover { opacity:.85; }
    .search-wrap .sbtn svg { width:13px; height:13px; }
    .topbar-right { display:flex; align-items:center; gap:.6rem; margin-left:auto; }
    .topbar-pill { background:var(--card); border:1px solid var(--border); border-radius:999px; padding:.38rem 1rem; font-size:.78rem; color:var(--muted2); cursor:pointer; transition:all .18s; white-space:nowrap; text-decoration:none; }
    .topbar-pill:hover { border-color:var(--accent); color:var(--accent); }

    /* ─ Page content ─ */
    .page-content { padding:1.8rem 2rem 4rem; }

    /* ─ Search header ─ */
    .search-header { margin-bottom:1.6rem; }
    .search-header-top { display:flex; align-items:center; gap:1rem; margin-bottom:.8rem; flex-wrap:wrap; }
    .search-title { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; letter-spacing:-.5px; }
    .result-count { font-size:.8rem; color:var(--muted); }

    /* ─ Filter chips ─ */
    .filter-chips { display:flex; gap:.5rem; flex-wrap:wrap; }
    .chip { padding:.32rem .85rem; border-radius:999px; font-size:.75rem; font-weight:500; cursor:pointer; transition:all .18s; border:1px solid var(--border); background:transparent; color:var(--muted2); }
    .chip:hover { border-color:var(--accent); color:var(--accent); }
    .chip.active { background:var(--accent); color:#0a0a0f; border-color:var(--accent); font-weight:700; }

    /* ─ Result Grid ─ */
    .result-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1.2rem; }
    .vid-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; text-decoration:none; color:inherit; display:block; transition:transform .22s,box-shadow .22s,border-color .22s; animation:fadeUp .4s ease both; }
    .vid-card:hover { transform:translateY(-5px); box-shadow:0 20px 50px rgba(0,0,0,.45); border-color:rgba(232,197,71,.35); }
    .vid-thumb { position:relative; aspect-ratio:16/9; overflow:hidden; background:var(--surface); }
    .vid-thumb img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .35s; }
    .vid-card:hover .vid-thumb img { transform:scale(1.05); }
    .vid-overlay { position:absolute; inset:0; background:rgba(0,0,0,0); display:flex; align-items:center; justify-content:center; transition:background .22s; }
    .vid-card:hover .vid-overlay { background:rgba(0,0,0,.4); }
    .vid-play { width:44px; height:44px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; opacity:0; transform:scale(.6); transition:opacity .2s,transform .2s; box-shadow:0 4px 20px rgba(232,197,71,.4); }
    .vid-card:hover .vid-play { opacity:1; transform:scale(1); }
    .vid-play svg { width:16px; height:16px; margin-left:3px; }
    .vid-body { padding:.85rem; }
    .vid-channel { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:.3rem; }
    .vid-title { font-family:'Syne',sans-serif; font-size:.82rem; font-weight:700; line-height:1.35; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

    /* ─ Empty / Error ─ */
    .empty-state { grid-column:1/-1; text-align:center; padding:4rem 2rem; }
    .empty-icon { font-size:3rem; margin-bottom:1rem; }
    .empty-state h3 { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; margin-bottom:.5rem; }
    .empty-state p { color:var(--muted); font-size:.85rem; }

    /* ─ Load more ─ */
    .load-more-wrap { display:flex; justify-content:center; margin-top:2.5rem; }
    .load-more-btn { background:transparent; border:1px solid var(--accent); color:var(--accent); font-family:'Syne',sans-serif; font-weight:700; font-size:.85rem; padding:.65rem 2rem; border-radius:999px; cursor:pointer; display:flex; align-items:center; gap:.5rem; transition:all .2s; }
    .load-more-btn:hover { background:rgba(232,197,71,.1); transform:translateY(-2px); }
    .load-more-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }
    .spin { width:13px; height:13px; border:2px solid rgba(232,197,71,.3); border-top-color:var(--accent); border-radius:50%; display:none; }
    .load-more-btn.loading .spin { display:block; animation:spin .7s linear infinite; }
    .load-more-btn.loading .lm-label { display:none; }

    /* ─ Skeleton ─ */
    .skeleton { background:linear-gradient(90deg,var(--card),var(--surface),var(--card)); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }
    @keyframes spin { to{transform:rotate(360deg)} }

    @media(max-width:900px) { .sidebar{display:none} .result-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))} }
    @media(max-width:600px) { .topbar{padding:.75rem 1rem} .page-content{padding:1.2rem 1rem 3rem} .search-title{font-size:1.2rem} .result-grid{grid-template-columns:repeat(2,1fr);gap:.8rem} }
  </style>
</head>
<body>
<div class="glow-blob glow1"></div>
<div class="glow-blob glow2"></div>

<div class="app">
  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <a href="index.html" class="logo">
        <div class="logo-icon"><svg viewBox="0 0 24 24" fill="#0a0a0f"><polygon points="5,3 19,12 5,21"/></svg></div>
        Vid<span>Search</span>
      </a>
      <div class="nav-section">
        <div class="nav-label">Menu</div>
        <a class="nav-item" href="index.html">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Beranda
        </a>
        <a class="nav-item active" href="search.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>Cari Musik
        </a>
      </div>
      <div class="nav-section" style="margin-top:1rem">
        <div class="nav-label">Jelajahi</div>
        <a class="nav-item" id="lnkTrending" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>Trending
        </a>
        <a class="nav-item" id="lnkPop" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>Pop Indonesia
        </a>
        <a class="nav-item" id="lnkKpop" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>K-Pop
        </a>
        <a class="nav-item" id="lnkHipHop" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 18v-6a9 9 0 0118 0v6"/><path d="M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3z"/><path d="M3 19a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3z"/></svg>Hip-Hop
        </a>
      </div>
    </div>
    <div class="sidebar-genres">
      <div class="nav-label">Indonesia</div>
      <div class="genre-grid">
        <a class="nav-item" id="lnkDangdut" href="#">🎵 Dangdut</a>
        <a class="nav-item" id="lnkIndie" href="#">🎸 Indie</a>
        <a class="nav-item" id="lnkOST" href="#">🎬 OST</a>
      </div>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div class="main">
    <div class="topbar">
      <a class="back-btn" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15,18 9,12 15,6"/></svg>
        Beranda
      </a>
      <div class="search-wrap">
        <input id="searchInput" type="text" placeholder="Cari artis, lagu, album..." onkeydown="if(event.key==='Enter')doSearch()"/>
        <button class="sbtn" onclick="doSearch()">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" stroke-width="2.5" stroke-linecap="round">
            <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/>
          </svg>
        </button>
      </div>
      <div class="topbar-right">
        <a class="topbar-pill" id="pillHits" href="#">🔥 Top Hits</a>
        <a class="topbar-pill" id="pillViral" href="#">✨ Viral</a>
      </div>
    </div>

    <div class="page-content">
      <div class="search-header">
        <div class="search-header-top">
          <div class="search-title" id="searchTitle">Mencari...</div>
          <div class="result-count" id="resultCount"></div>
        </div>
        <!-- Filter chips -->
        <div class="filter-chips" id="filterChips"></div>
      </div>

      <div class="result-grid" id="resultGrid"></div>

      <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
        <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">
          <div class="spin"></div>
          <span class="lm-label">↓ Muat Lebih Banyak</span>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  const API_KEY = "AIzaSyCalKgiv801ubBNf0hrO3WprQ5kAZIE9GM";
  const YEAR    = new Date().getFullYear();

  // ─ Helper ─
  function s(q) { return `search.html?q=${encodeURIComponent(q)}`; }

  // ─ Sidebar links ─
  document.getElementById('lnkTrending').href = s(`top hits ${YEAR}`);
  document.getElementById('lnkPop').href      = s(`musik pop indonesia ${YEAR}`);
  document.getElementById('lnkKpop').href     = s(`kpop hits ${YEAR}`);
  document.getElementById('lnkHipHop').href   = s(`hip hop rap ${YEAR}`);
  document.getElementById('lnkDangdut').href  = s(`dangdut viral ${YEAR}`);
  document.getElementById('lnkIndie').href    = s(`indie pop indonesia ${YEAR}`);
  document.getElementById('lnkOST').href      = s(`ost film indonesia ${YEAR}`);
  document.getElementById('pillHits').href    = s(`top music ${YEAR}`);
  document.getElementById('pillViral').href   = s(`viral music ${YEAR}`);

  // ─ State ─
  let currentQuery  = '';
  let nextPageToken = null;
  let totalLoaded   = 0;

  // ─ Suggested searches for empty state ─
  const SUGGESTIONS = [
    `Top Hits ${YEAR}`, `Viral Music ${YEAR}`, 'Taylor Swift', 'The Weeknd',
    'Musik Indonesia', 'K-Pop Terbaru', 'Hip Hop', 'Raisa', 'Tulus', 'Coldplay',
  ];

  // ─ Filter chips for quick genre switch ─
  const FILTERS = [
    { label:'Semua',          q:'' },
    { label:'🔥 Trending',   q:`trending music ${YEAR}` },
    { label:'🇮🇩 Indonesia', q:`musik indonesia ${YEAR}` },
    { label:'🌍 Global',     q:`global hits ${YEAR}` },
    { label:'🎤 K-Pop',      q:`kpop ${YEAR}` },
    { label:'🎸 Rock',       q:`rock music ${YEAR}` },
    { label:'🎹 Pop',        q:`pop hits ${YEAR}` },
    { label:'🎧 Hip-Hop',    q:`hip hop ${YEAR}` },
  ];

  function renderFilterChips(activeQuery) {
    document.getElementById('filterChips').innerHTML = FILTERS.map(f => {
      const isActive = activeQuery === f.q || (f.q === '' && !FILTERS.slice(1).find(x=>x.q===activeQuery));
      return `<button class="chip${isActive?' active':''}" onclick="filterSearch('${esc(f.q)}')">${f.label}</button>`;
    }).join('');
  }

  function filterSearch(q) {
    if (!q) {
      // reset to empty search page
      window.location.href = 'search.html';
      return;
    }
    document.getElementById('searchInput').value = q;
    runSearch(q);
  }

  // ─ Init ─
  const params = new URLSearchParams(window.location.search);
  const initQ  = params.get('q') || '';

  if (initQ) {
    document.getElementById('searchInput').value = initQ;
    document.title = `${initQ} — VidSearch Music`;
    renderFilterChips(initQ);
    runSearch(initQ);
  } else {
    // Empty state: show suggestions
    document.getElementById('searchTitle').textContent = 'Cari Musik';
    renderFilterChips('');
    showEmptyState();
  }

  function showEmptyState() {
    document.getElementById('resultCount').textContent = '';
    document.getElementById('resultGrid').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎵</div>
        <h3>Temukan musik favoritmu</h3>
        <p style="margin-bottom:1.2rem">Ketik nama artis, judul lagu, atau genre di atas</p>
        <div style="display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-top:.5rem">
          ${SUGGESTIONS.map(sg=>`<button onclick="quickSearch('${esc(sg)}')" style="background:var(--card);border:1px solid var(--border);border-radius:999px;padding:.4rem 1rem;font-size:.78rem;color:var(--muted2);cursor:pointer;transition:all .18s" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted2)'">${esc(sg)}</button>`).join('')}
        </div>
      </div>`;
  }

  function quickSearch(q) {
    document.getElementById('searchInput').value = q;
    window.location.href = s(q);
  }

  function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    window.location.href = s(q);
  }

  function runSearch(q) {
    currentQuery  = q;
    nextPageToken = null;
    totalLoaded   = 0;

    document.getElementById('searchTitle').textContent = `"${q}"`;
    document.getElementById('resultCount').textContent = '';
    document.getElementById('resultGrid').innerHTML    = skelVids(12);
    document.getElementById('loadMoreWrap').style.display = 'none';

    fetchPage(q, null, true);
  }

  function loadMore() {
    if (!nextPageToken || !currentQuery) return;
    const btn = document.getElementById('loadMoreBtn');
    btn.classList.add('loading');
    btn.disabled = true;
    fetchPage(currentQuery, nextPageToken, false);
  }

  function fetchPage(q, pageToken, isNew) {
    let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&maxResults=24&type=video&key=${API_KEY}`;
    if (pageToken) url += `&pageToken=${encodeURIComponent(pageToken)}`;

    fetch(url)
      .then(r => r.json())
      .then(data => {
        const grid     = document.getElementById('resultGrid');
        const btn      = document.getElementById('loadMoreBtn');
        const loadWrap = document.getElementById('loadMoreWrap');

        if (data.error) {
          if (isNew) grid.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Terjadi Error</h3><p>${esc(data.error.message)}</p></div>`;
          btn.classList.remove('loading'); btn.disabled = false;
          return;
        }

        nextPageToken = data.nextPageToken || null;
        const items   = (data.items || []).filter(it => it.id.videoId);
        if (isNew) grid.innerHTML = '';

        if (isNew && items.length === 0) {
          grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><h3>Tidak ada hasil</h3><p>Coba kata kunci lain atau periksa ejaan kamu.</p></div>`;
        } else {
          grid.insertAdjacentHTML('beforeend', items.map((it,i) => vidCard(it, totalLoaded+i)).join(''));
        }
        totalLoaded += items.length;
        document.getElementById('resultCount').textContent = `${totalLoaded} hasil ditemukan`;

        loadWrap.style.display = nextPageToken && items.length > 0 ? 'flex' : 'none';
        btn.classList.remove('loading'); btn.disabled = false;
      })
      .catch(() => {
        const grid = document.getElementById('resultGrid');
        if (isNew) grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📡</div><h3>Koneksi Gagal</h3><p>Periksa koneksi internet kamu dan coba lagi.</p></div>`;
        document.getElementById('loadMoreBtn').classList.remove('loading');
        document.getElementById('loadMoreBtn').disabled = false;
      });
  }

  function vidCard(it, i) {
    const vid=it.id.videoId; if(!vid) return '';
    const t=esc(it.snippet.title), ch=esc(it.snippet.channelTitle);
    const thumb=it.snippet.thumbnails.high?.url||it.snippet.thumbnails.medium?.url||'';
    const delay = (Math.min(i,11)*.04).toFixed(2);
    return `<a class="vid-card" href="player.html?v=${vid}&title=${encodeURIComponent(t)}&channel=${encodeURIComponent(ch)}" style="animation-delay:${delay}s">
      <div class="vid-thumb">
        <img src="${thumb}" alt="${t}" loading="lazy"/>
        <div class="vid-overlay"><div class="vid-play"><svg viewBox="0 0 24 24" fill="#0a0a0f"><polygon points="5,3 19,12 5,21"/></svg></div></div>
      </div>
      <div class="vid-body">
        <div class="vid-channel">${ch}</div>
        <div class="vid-title">${t}</div>
      </div>
    </a>`;
  }

  function skelVids(n) {
    return Array.from({length:n},()=>`<div style="border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)"><div class="skeleton" style="aspect-ratio:16/9;width:100%"></div><div style="padding:.85rem"><div class="skeleton" style="height:9px;width:45%;margin-bottom:8px"></div><div class="skeleton" style="height:10px;width:92%;margin-bottom:6px"></div><div class="skeleton" style="height:10px;width:70%"></div></div></div>`).join('');
  }

  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
